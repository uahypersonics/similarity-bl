# --------------------------------------------------
# site metadata
# --------------------------------------------------
site_name: simbl
site_url: https://uahypersonics.github.io/similarity-bl
site_author: Christoph Hader
site_description: Compressible similarity boundary layer solver

# --------------------------------------------------
# github repository
# --------------------------------------------------
repo_name: uahypersonics/similarity-bl
repo_url: https://github.com/uahypersonics/similarity-bl
edit_uri: edit/main/docs/

# --------------------------------------------------
# theme
# --------------------------------------------------
theme:
  name: material
  palette:
    - media: "(prefers-color-scheme)"
      toggle:
        icon: material/brightness-auto
        name: Switch to light mode
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: blue grey
      accent: blue grey
      toggle:
        icon: material/weather-sunny
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: blue grey
      accent: blue grey
      toggle:
        icon: material/weather-night
        name: Switch to system preference
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.indexes
    - navigation.top
    - content.code.copy
    - content.code.annotate
    - content.action.edit
    - content.action.view
    - content.tabs.link

# --------------------------------------------------
# plugins
# --------------------------------------------------
plugins:
  - search
  - bibtex:
      bib_file: "docs/refs.bib"

# --------------------------------------------------
# markdown extensions
# --------------------------------------------------
markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
      linenums: true
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.arithmatex:
      generic: true
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - admonition
  - pymdownx.details
  - tables
  - attr_list
  - md_in_html
  - footnotes

# --------------------------------------------------
# MathJax for LaTeX rendering
# --------------------------------------------------
extra_javascript:
  - javascripts/mathjax.js
  - https://unpkg.com/mathjax@3/es5/tex-mml-chtml.js

# --------------------------------------------------
# navigation
# --------------------------------------------------
nav:
  - Home: index.md
  - Installation: installation.md
  - User Guide:
    - user_guide/index.md
    - CLI Usage: user_guide/cli_usage.md
    - API Usage: user_guide/api_usage.md
    - MATLAB Usage: user_guide/matlab_usage.md
  - Workflow:
    - workflow/index.md
  - Configuration:
    - configuration/index.md
    - Inputs: configuration/inputs.md
    - Solver Options: configuration/solver_options.md
    - Output Formats: configuration/output_formats.md        
  - CLI Reference:
    - cli_reference/index.md
  - API Reference:
    - api_reference/index.md
    - Architecture: api_reference/architecture.md
  - Theory:
    - theory/index.md
    - Boundary Layer Equations:
      - theory/boundary_layer_equations/index.md
      - 2D: theory/boundary_layer_equations/2d_equations.md
      - 3D: theory/boundary_layer_equations/3d_equations.md
      - Quasi-3D: theory/boundary_layer_equations/quasi_3d_equations.md
    - Falkner-Skan:
      - theory/falkner_skan/index.md
      - Derivation (Levy-Lees): theory/falkner_skan/derivation.md
      - Derivation (IS): theory/falkner_skan/derivation_is.md
      - Reduction of Order: theory/falkner_skan/reduction_of_order.md
    - Falkner-Skan-Cooke:
      - theory/falkner_skan_cooke/index.md
      - Derivation (Levy-Lees): theory/falkner_skan_cooke/derivation.md
      - Derivation (IS): theory/falkner_skan_cooke/derivation_is.md
      - Reduction of Order: theory/falkner_skan_cooke/reduction_of_order.md
    - Virtual Origin Concept:
      - theory/virtual_origin_concept/index.md
  - Validation and Verification:
    - vnv/index.md
    - Verification:
      - vnv/verification/index.md
      - Falkner-Skan:
        - vnv/verification/falkner_skan/index.md
        - Blasius limit: vnv/verification/falkner_skan/blasius.md
        - Crocco relation: vnv/verification/falkner_skan/crocco.md
        - Hiemenz stagnation point: vnv/verification/falkner_skan/hiemenz/index.md
        - Hartree table: vnv/verification/falkner_skan/hartree/index.md
        - Separation point: vnv/verification/falkner_skan/separation/index.md
      - Falkner-Skan-Cooke:
        - vnv/verification/falkner_skan_cooke/index.md
    - Validation:
      - vnv/validation/index.md
      - Falkner-Skan:
        - vnv/validation/falkner_skan/index.md
        - Sharp flat plate (M=5, isothermal): vnv/validation/sharp_flat_plate_mach_05pt00_re1_11pt40e6_isothermal_tw_300_k/index.md
      - Falkner-Skan-Cooke:
        - vnv/validation/falkner_skan_cooke/index.md
  - Examples: 
    - examples/index.md
  - Nomenclature: nomenclature.md
