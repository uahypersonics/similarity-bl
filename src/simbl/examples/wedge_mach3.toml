# Mach 3 wedge - favourable pressure gradient beta = 0.33
# run: simbl solve wedge_mach3.toml

equations = "falkner_skan"

[conditions]
mach_edge = 3.0
temp_edge = 200.0
beta = 0.33

[gas]
gamma = 1.4
prandtl = 0.72

[wall]
type = "adiabatic"

[viscosity]
model = "sutherland"

[numerics]
eta_max = 15.0
n_points = 500
tolerance = 1e-8
max_iterations = 100
ode_method = "LSODA"
max_solve_time = 20.0
