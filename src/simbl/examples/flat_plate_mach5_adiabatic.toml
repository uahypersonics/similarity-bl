# Mach 5 adiabatic flat plate - typical hypersonic wind-tunnel condition
# run: simbl solve flat_plate_mach5_adiabatic.toml

equations = "falkner_skan"

[conditions]
mach_edge = 5.0
temp_edge = 68.0
beta = 0.0

[gas]
gamma = 1.4
prandtl = 0.72

[wall]
type = "adiabatic"

[viscosity]
model = "sutherland"

[numerics]
eta_max = 15.0
n_points = 500
tolerance = 1e-8
max_iterations = 100
ode_method = "LSODA"
max_solve_time = 20.0
