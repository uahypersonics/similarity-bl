# Blasius flat-plate boundary layer - near-incompressible limit (M = 0.1)
# Reference: Blasius (1908), f''(0) ~ 0.4696 (incompressible)
# run: simbl solve blasius.toml

equations = "falkner_skan"

[conditions]
mach_edge = 0.1
temp_edge = 300.0
beta = 0.0

[gas]
gamma = 1.4
prandtl = 0.72

[wall]
type = "adiabatic"

[viscosity]
model = "sutherland"

[numerics]
eta_max = 15.0
n_points = 500
tolerance = 1e-8
max_iterations = 100
ode_method = "LSODA"
max_solve_time = 20.0
